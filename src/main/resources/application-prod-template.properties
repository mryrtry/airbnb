server.port=@SERVER_PORT@

# Datasource (used by JtaConfig to build XA datasource)
spring.datasource.url=@DB_URL@
spring.datasource.username=@DB_USERNAME@
spring.datasource.password=@DB_PASSWORD@

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.transaction.jta.platform=com.atomikos.icatch.jta.hibernate5.AtomikosJTAPlatform

# Atomikos JTA
spring.jta.enabled=true

# JAAS XML credentials file path
airbnb.credentials.xml.path=@CREDENTIALS_XML_PATH@

airbnb.jwt.secret=@JWT_SECRET@
airbnb.jwt.access-token.expiration=1h
airbnb.jwt.refresh-token.expiration=7d

airbnb.mail.enabled=true
airbnb.mail.from=@MAIL_FROM@
spring.mail.host=@MAIL_HOST@
spring.mail.port=@MAIL_PORT@
spring.mail.username=@MAIL_USERNAME@
spring.mail.password=@MAIL_PASSWORD@
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=true

airbnb.resolution.scheduler.cron=0 0 * * * *