server.port=@SERVER_PORT@

# JNDI name must match the Resource id in tomee.xml (openejb:Resource/<id>).
spring.datasource.jndi-name=openejb:Resource/${DATASOURCE_JNDI_ID}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update

spring.jta.enabled=true

# JAAS XML credentials file path (writable location outside the WAR)
airbnb.credentials.xml.path=${CREDENTIALS_XML_PATH}

airbnb.jwt.secret=${JWT_SECRET}
airbnb.jwt.access-token.expiration=2m
airbnb.jwt.refresh-token.expiration=7d

airbnb.mail.enabled=true
airbnb.mail.from=${MAIL_FROM}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=true

airbnb.resolution.scheduler.cron=0 0 * * * *