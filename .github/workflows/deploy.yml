name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  SERVER_PORT: 8126
  DEPLOY_HOST: se.ifmo.ru
  DEPLOY_USER: s409483
  DEPLOY_PORT: "2222"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Generate application-prod.properties from template
        run: |
          mkdir -p src/main/resources
          cp src/main/resources/application-prod-template.properties src/main/resources/application-prod.properties
          sed -i "s|@SERVER_PORT@|${{ env.SERVER_PORT }}|g" src/main/resources/application-prod.properties
          sed -i "s|@DB_URL@|${{ secrets.DB_URL }}|g" src/main/resources/application-prod.properties
          sed -i "s|@DB_USERNAME@|${{ secrets.DB_USERNAME }}|g" src/main/resources/application-prod.properties
          sed -i "s|@DB_PASSWORD@|${{ secrets.DB_PASSWORD }}|g" src/main/resources/application-prod.properties
          sed -i "s|airbnb.jwt.secret=@JWT_SECRET@|airbnb.jwt.secret=${{ secrets.JWT_SECRET }}|g" src/main/resources/application-prod.properties
          sed -i "s|@MAIL_FROM@|${{ secrets.MAIL_FROM }}|g" src/main/resources/application-prod.properties
          sed -i "s|@MAIL_HOST@|${{ secrets.MAIL_HOST }}|g" src/main/resources/application-prod.properties
          sed -i "s|@MAIL_PORT@|${{ secrets.MAIL_PORT }}|g" src/main/resources/application-prod.properties
          sed -i "s|@MAIL_USERNAME@|${{ secrets.MAIL_USERNAME }}|g" src/main/resources/application-prod.properties
          sed -i "s|@MAIL_PASSWORD@|${{ secrets.MAIL_PASSWORD }}|g" src/main/resources/application-prod.properties

      - name: Build with Maven
        run: mvn -B clean package -P prod -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/airbnb-0.1.jar
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: ./artifact

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Create directory structure on server
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} /bin/sh << 'EOF'
          mkdir -p ~/airbnb
          EOF

      - name: Stop existing application
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} /bin/sh << 'EOF'
          PID=$(pgrep -f airbnb.jar || true)
          if [ -n "$PID" ]; then
            kill -9 $PID
            echo "Stopped airbnb.jar (PID $PID)"
          else
            echo "No airbnb.jar process found"
          fi
          EOF

      - name: Upload JAR to server
        run: scp -P ${{ env.DEPLOY_PORT }} ./artifact/airbnb-0.1.jar ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:~/airbnb/airbnb.jar

      - name: Start application
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} /bin/sh << 'EOF'
          cd ~/airbnb
          _JAVA_OPTIONS=""
          nohup java -Xmx512m -Xms256m -jar airbnb.jar --spring.profiles.active=prod > airbnb.log 2>&1 &
          EOF

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Check application process
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} /bin/sh << 'EOF'
          ps aux | grep airbnb.jar | grep -v grep
          EOF

      - name: Check application logs
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} /bin/sh << 'EOF'
          tail -20 ~/airbnb/airbnb.log
          EOF

      - name: Check health endpoint
        run: |
          sleep 30
          ssh -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} /bin/sh << 'EOF'
          curl -s -o /dev/null -w 'Health Check: %{http_code}\n' localhost:${{ env.SERVER_PORT }}/health
          EOF
